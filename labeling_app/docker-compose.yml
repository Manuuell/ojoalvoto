services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: safevote
      POSTGRES_PASSWORD: ${DB_PASSWORD:-safevote}
      POSTGRES_DB: safevote
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safevote"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://safevote:${DB_PASSWORD:-safevote}@db:5432/safevote
      PDFS_DIR: /data/pdfs
      MANIFEST: /data/manifest.csv
      CACHE_DIR: /data/cache
      PREFILL: /data/prefills.jsonl
    volumes:
      - ./data:/data          # aquí van manifest.csv, pdfs/, cache/, prefills.jsonl
    ports:
      - "127.0.0.1:8000:8000" # solo localhost; nginx del host hace de proxy público

volumes:
  pgdata:
