# nginx del HOST — reverse proxy a la app en Docker (127.0.0.1:8000)
# Copiar a /etc/nginx/sites-available/safevote y enlazar a sites-enabled.
# Luego: certbot --nginx -d tudominio.com   (agrega el bloque TLS automáticamente)

server {
    listen 80;
    server_name tudominio.com www.tudominio.com;   # <-- CAMBIA por tu dominio

    client_max_body_size 20M;

    # Imágenes de actas: cachear en el navegador (no cambian)
    location /api/image/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }
}
